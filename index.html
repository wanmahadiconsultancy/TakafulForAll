<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        /* Profile Image */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #ddd;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; }

        /* Buttons */
        .links a {
            display: block;
            background: white;
            color: #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #ddd;
            transition: transform 0.2s, background 0.2s;
        }
        .links a:hover {
            transform: scale(1.02);
            background: #f0f0f0;
        }
    </style>
</head>
<body>
