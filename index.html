<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan Mahadi - Links</title>
    <!-- This loads the social media icons dynamically -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Smooth scrolling behavior when clicking anchor links */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 20px 20px 40px;
        }
        /* Profile Image */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #ddd;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Typography */
        h1 { 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: #111; 
            letter-spacing: -0.5px;
        }
        p.subtitle { 
            color: #00AAA5; /* Official PruBSN Teal Blue */
            margin-bottom: 25px; 
            font-size: 1.05rem; 
            font-weight: 700; 
        }

        /* Horizontal Social Icon Row */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 14px; /* Space between the circles */
            margin-bottom: 20px; 
        }
        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background-color: #f0f2f5; 
            color: #1b1f23; 
            border-radius: 50%; 
            text-decoration: none;
            font-size: 1.3rem; 
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .social-icons a:hover {
            transform: scale(1.08);
            background-color: #e4e6eb;
        }

        /* Company Logo styling */
        .company-logo {
            width: 130px;
            height: auto;
            display: inline-block;
            margin: 10px 0 30px 0; 
        }

        /* Linktree-style Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        /* Button 1: Takaful Form (PruBSN Teal) */
        .btn-form {
            background-color: #00AAA5;
            color: #ffffff;
        }
        /* Button 2: WhatsApp (WhatsApp Green) */
        .btn-whatsapp {
            background-color: #25D366;
            color: #ffffff;
        }

        /* Contact Form Section */
        .form-section {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            text-align: left;
            margin-bottom: 20px;
            scroll-margin-top: 20px; 
        }
        .form-section h3 {
            margin: 0 0 8px 0;
            font-size: 1.25rem;
            color: #1e293b;
            text-align: center;
        }
        .form-section p {
            margin: 0 0 20px 0;
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #00AAA5;
        }

        /* Styles for multiple choice checkbox group */
        .checkbox-group {
            background-color: #ffffff;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: #334155;
            cursor: pointer;
            font-weight: normal !important;
        }
        .checkbox-label input[type="checkbox"] {
            width: auto; 
            margin: 0;
            transform: scale(1.1);
            accent-color: #00AAA5; 
        }

        .btn-submit {
            background-color: #00AAA5;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-submit:hover {
            background-color: #008f8a;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Picture -->
        <div class="profile-img">
            <img src="profile.jpg" alt="Profile">
        </div>

        <!-- Name & Professional Title -->
        <h1>Wan Mahadi Wan Omar</h1>
        <p class="subtitle">Full-time PruBSN Takaful Consultant</p>

        <!-- Circular Social Media Row -->
        <div class="social-icons">
            <a href="https://www.facebook.com/mahadiomar" target="_blank" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://www.instagram.com/wanmahadiconsultancy/?hl=en" target="_blank" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.linkedin.com/in/wan-mahadi-wan-omar-403bb921/" target="_blank" title="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://wa.me/60126560299" target="_blank" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>

        <!-- Company Logo -->
        <img src="logo.jpg" alt="PruBSN Takaful Logo" class="company-logo">

        <!-- Action Buttons -->
        <div class="action-buttons">
            <a href="#takaful-inquiry" class="btn btn-form">
                <i class="fa-regular fa-file-lines"></i> Request a Takaful Quote
            </a>
            <a href="https://wa.me/60126560299?text=Hi%20Wan%20Mahadi,%20I%20would%20like%20to%20inquire%20about%20PruBSN%20Takaful." target="_blank" class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </a>
        </div>

        <!-- Contact/Inquiry Form (Submit redirects directly to your WhatsApp) -->
        <div id="takaful-inquiry" class="form-section">
            <h3>PruBSN Takaful Consultation</h3>
            <p>Leave your details below to instantly generate your quote details.</p>
            
            <form id="takafulForm">
                
                <!-- 1. Full Name -->
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Your Name as per IC" required>
                </div>
                
                <!-- 2. Phone Number (WhatsApp) -->
                <div class="form-group">
                    <label for="phone">Phone Number (WhatsApp)</label>
                    <input type="tel" id="phone" placeholder="e.g. 0123456789" required>
                </div>

                <!-- 3. Date of Birth -->
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <!-- 4. Occupation -->
                <div class="form-group">
                    <label for="occupation">Occupation</label>
                    <input type="text" id="occupation" placeholder="e.g. Engineer, Teacher" required>
                </div>

                <!-- 5. Smoking / Vaping Status -->
                <div class="form-group">
                    <label for="smoking">Smoking/Vaping Status</label>
                    <select id="smoking" required>
                        <option value="" disabled selected>Please select...</option>
                        <option value="Yes">Yes, I smoke/vape</option>
                        <option value="No">No, I do not smoke/vape</option>
                    </select>
                </div>

                <!-- 6. Coverage of Interest (Multiple Choice Checkboxes) -->
                <div class="form-group">
                    <label>Coverage of Interest (Select all that apply)</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="coverage" value="Hibah Takaful"> Hibah Takaful
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="coverage" value="Medical Card"> Medical Card
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="coverage" value="Critical Illness"> Critical Illness
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="coverage" value="Education Plan"> Education Plan
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="coverage" value="Retirement Plan"> Retirement Plan
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="coverage" value="General Enquiry"> General Enquiry
                        </label>
                    </div>
                </div>

                <!-- Optional Message -->
                <div class="form-group">
                    <label for="message">Your Message (Optional)</label>
                    <textarea id="message" rows="3" placeholder="Any specific requirements?"></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fab fa-whatsapp"></i> Send via WhatsApp
                </button>
            </form>
        </div>
    </div>

    <!-- JAVASCRIPT FOR WHATSAPP REDIRECTION -->
    <script>
        document.getElementById('takafulForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the standard form reload

            // Get form values
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const dob = document.getElementById('dob').value;
            const occupation = document.getElementById('occupation').value;
            const smoking = document.getElementById('smoking').value;
            const optionalMsg = document.getElementById('message').value || "None";

            // Gather all checked boxes
            const checkedBoxes = document.querySelectorAll('input[name="coverage"]:checked');
            let coverages = [];
            checkedBoxes.forEach(function(box) {
                coverages.push(box.value);
            });
            const coverageList = coverages.length > 0 ? coverages.join(', ') : 'General Enquiry';

            // Format the message with neat WhatsApp formatting (using stars for bold)
            const whatsappMessage = 
                `Salam Sejahtera Tuan Wan Mahadi,\n\n` +
                `Saya berminat untuk mendapatkan consultation PruBSN Takaful. Berikut adalah butiran saya:\n\n` +
                `*Nama penuh:* ${name}\n` +
                `*No. Telefon:* ${phone}\n` +
                `*Tarikh Lahir:* ${dob}\n` +
                `*Pekerjaan:* ${occupation}\n` +
                `*Status Merokok/Vape:* ${smoking}\n` +
                `*Perlindungan yang Diminati:* ${coverageList}\n` +
                `*Mesej Tambahan:* ${optionalMsg}\n\n` +
                `Mohon bantu saya sediakan sebut harga (quotation) yang sesuai. Terima kasih!`;

            // Encode the text so the browser can read it properly
            const encodedMessage = encodeURIComponent(whatsappMessage);

            // Redirect to your exact WhatsApp link (with your phone number 60126560299)
            const whatsappUrl = `https://wa.me/60126560299?text=${encodedMessage}`;

            // Open WhatsApp in a new tab
            window.open(whatsappUrl, '_blank');
        });
    </script>

</body>
</html>
